<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>スリーショット撮影会</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="page_ticket">
    <div id="wrapper">
      <header>
        <div class="myContainer">
          <div>
            <h1><img alt="forTUNE meets" src="image_1.png"></h1>
            <button class="button ol-gray logout" id="logoutBtn">ログアウト</button>
          </div>
        </div>
      </header>

      <main class="main">
        <div class="myContainer">
          <div class="cont-wrapper">
            <div id="content">
              <div class="titleWrap">
                <h2 class="title" id="eventTitle">読み込み中...</h2>
              </div>
              <div class="intro">
                <p class="txt" id="eventSubtitle"></p>
              </div>
              <div id="mainContent">
                <h3 class="border-left-heading">チケット情報</h3>
                <div class="ticketItemList">
                  <div class="ticketItem">
                    <p class="laneEventDate" id="eventDate"></p>
                    <div class="laneName">
                      <div class="part" id="eventPart"></div>
                      <div class="name" id="eventName"></div>
                    </div>
                    <div class="laneInfo">
                      <p id="eventStartTime"></p>
                      <p id="eventReceptionTime"></p>
                    </div>
                    <div class="laneTicket">
                      保有枚数：<span class="used">0</span>枚使用 / <span class="own">1</span>枚
                    </div>
                    <button class="button round gray">イベントに参加する</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div>
          <a href="#">お問合せ</a>
          <a href="#">プライバシーポリシー</a>
        </div>
        <small>&copy;Sony Music Solutions Inc. All rights reserved.</small>
      </footer>
    </div>

    <script>
      async function loadEvent() {
        try {
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");
          const url = id ? `/api/events/${id}` : "/api/events";
          const res = await fetch(url);
          if (!res.ok) return;
          const event = await res.json();

          document.getElementById("eventTitle").textContent = event.title;
          document.getElementById("eventSubtitle").textContent = event.subtitle;
          document.getElementById("eventDate").textContent = event.event_date;
          document.getElementById("eventPart").textContent = event.part;
          document.getElementById("eventName").textContent = event.name;
          document.getElementById("eventStartTime").textContent = "開催：" + event.start_time;
          document.getElementById("eventReceptionTime").textContent = "受付：" + event.reception_start;
        } catch (e) {
          console.error("イベント情報の取得に失敗しました", e);
        }
      }

      loadEvent();
    </script>
  </body>
</html>
