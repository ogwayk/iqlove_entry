<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Meets Clone</title>
    <script src="https://webfont.fontplus.jp/accessor/script/fontplus.js?Q3QP~JOAsB4%3D&box=39QuvpukYhw%3D&aa=1&ab=2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="image_1.png" alt="fortune meets フォーチュンミーツ" class="logo-image">
        </div>
        <button class="logout-btn">ログアウト</button>
    </header>

    <main>
        <section class="event-title">
            <h1 id="eventTitle">読み込み中...</h1>
            <p id="eventSubtitle"></p>
        </section>

        <section class="ticket-info">
            <h2 class="section-label">チケット情報</h2>

            <div class="ticket-card">
                <p class="date" id="eventDate"></p>
                <p class="section-num" id="eventPart"></p>
                <p class="artist-name" id="eventName"></p>

                <div class="time-details" id="eventTimes">
                    <p id="eventStartTime"></p>
                    <p id="eventReceptionTime"></p>
                </div>

                <div class="count">
                    保有枚数：<strong>0</strong>枚使用 / <strong>1</strong>枚
                </div>

                <button class="action-btn">イベントに参加する</button>
            </div>
        </section>
    </main>

    <footer>
        <div>
            <a href="#">お問合せ</a>
            <a href="#">プライバシーポリシー</a>
        </div>
        <small>&copy;Sony Music Solutions Inc. All rights reserved.</small>
    </footer>

    <script>
      async function loadEvent() {
        try {
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");
          const url = id ? `/api/events/${id}` : "/api/events";
          const res = await fetch(url);
          if (!res.ok) return;
          const event = await res.json();

          document.getElementById("eventTitle").textContent = event.title;
          document.getElementById("eventSubtitle").textContent = event.subtitle;
          document.getElementById("eventDate").textContent = event.event_date.slice(0, 10);
          document.getElementById("eventName").textContent = event.name;
          document.getElementById("eventStartTime").textContent = "開催：" + event.start_time;
          document.getElementById("eventReceptionTime").textContent = "受付：" + event.reception_start;

          // 「第3部」→ 第<span>3</span>部 に変換
          const partEl = document.getElementById("eventPart");
          const partMatch = event.part && event.part.match(/^第(\d+)部$/);
          if (partMatch) {
            partEl.innerHTML = `第<span>${partMatch[1]}</span>部`;
          } else {
            partEl.textContent = event.part;
          }
        } catch (e) {
          console.error("イベント情報の取得に失敗しました", e);
        }
      }

      loadEvent();
    </script>
</body>
</html>
