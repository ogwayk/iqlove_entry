<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Meets Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="image_1.png" alt="fortune meets フォーチュンミーツ" class="logo-image">
        </div>
        <button class="logout-btn">ログアウト</button>
    </header>

    <main>
        <section class="event-title">
            <h1>＝LOVE 20thシングル『劇薬中毒』発売記念</h1>
            <p>個別お話会</p>
        </section>

        <section class="ticket-info">
            <h2 class="section-label">チケット情報</h2>
            
            <div class="ticket-card">
                <p class="date">2026-05-03</p>
                <p class="section-num">第<span>3</span>部</p>
                <p class="artist-name">大谷 映美里</p>
                
                <div class="time-details">
                    <p>開催：15:00～16:30</p>
                    <p>受付：14:30～16:00</p>
                </div>

                <div class="count">
                    保有枚数：<strong>0</strong>枚使用 / <strong>1</strong>枚
                </div>

                <button class="action-btn">イベントに参加する</button>
            </div>
        </section>
    </main>
</body>
</html>
